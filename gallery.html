<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Sylvan Retreat</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <nav class="glass-dark">
        <div class="container flex justify-between align-center">
            <div class="logo serif" style="font-size: 24px;"><a href="index.html">SYLVAN</a></div>
            <ul class="flex align-center nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="stay.html">Stay</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html" class="text-accent">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="booking.html" class="btn btn-primary" style="margin-left: 20px;">Book Now</a></li>
            </ul>
        </div>
    </nav>

    <section class="section-padding" style="margin-top: 50px;">
        <div class="container">
            <div style="text-align: center; margin-bottom: 80px;">
                <h4 class="text-accent uppercase">Through the Lens</h4>
                <h1 class="serif" style="font-size: 64px;">The Wild Captured</h1>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item large" style="background-image: url('assets/images/hero-main.png');">
                    <div class="gallery-overlay"><h3>The Canopy Lodge</h3></div>
                </div>
                <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=800&q=80');">
                    <div class="gallery-overlay"><h3>Morning Mist</h3></div>
                </div>
                <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1549130031-159c8ec5c3e7?auto=format&fit=crop&w=800&q=80');">
                    <div class="gallery-overlay"><h3>Jaguar Watch</h3></div>
                </div>
                <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1590523741831-ab7e8b8f9c7f?auto=format&fit=crop&w=800&q=80');">
                    <div class="gallery-overlay"><h3>Eco-Symmetry</h3></div>
                </div>
                <div class="gallery-item tall" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=1200');">
                    <div class="gallery-overlay"><h3>Hidden Waterfalls</h3></div>
                </div>
                <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&w=800&q=80');">
                    <div class="gallery-overlay"><h3>Sunset Canopy</h3></div>
                </div>
            </div>
        </div>
    </section>

    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 250px;
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: 0.5s transform;
        }

        .gallery-item.large { grid-column: span 2; grid-row: span 2; }
        .gallery-item.tall { grid-row: span 2; }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 61, 46, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.4s opacity;
        }

        .gallery-item:hover { transform: scale(1.02); }
        .gallery-item:hover .gallery-overlay { opacity: 1; }

        .gallery-overlay h3 { font-size: 20px; color: var(--accent); }

        @media (max-width: 992px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; grid-auto-rows: 200px; }
            .gallery-item.large { grid-column: span 1; grid-row: span 1; }
            .gallery-item.tall { grid-row: span 1; }
        }
    </style>
</body>
</html>
