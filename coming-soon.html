<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forest is Calling | Coming Soon</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="assets/images/logo-icon.png">
    <style>
        .coming-soon {
            height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/images/hero-main.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <section class="coming-soon">
        <div class="container">
            <div class="logo flex justify-center align-center" style="margin-bottom: 20px;">
                <img src="assets/images/logo-icon.png" alt="Sylvan Icon" class="logo-icon" style="height: 40px; margin-right: 15px;">
                <h2 class="serif" style="font-size: 24px; letter-spacing: 8px; color: var(--accent); margin-bottom: 0;">SYLVAN RETREAT</h2>
            </div>
            <h1 class="serif" style="font-size: clamp(48px, 10vw, 100px); color: white; line-height: 1.1; margin-bottom: 40px;">Arriving <br>Summer 2026</h1>
            <p style="max-width: 500px; margin: 0 auto 40px; color: rgba(255,255,255,0.8); font-size: 18px;">
                Our sanctuaries are being handcrafted. Join the waitlist for exclusive early access to the heart of the Amazon.
            </p>
            <form class="flex" style="max-width: 400px; margin: 0 auto;">
                <input type="email" placeholder="Your Email Address" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 15px; flex: 1; border-top-right-radius: 0; border-bottom-right-radius: 0;">
                <button class="btn btn-primary" style="border-top-left-radius: 0; border-bottom-left-radius: 0;">Notify Me</button>
            </form>
        </div>
    </section>

</body>
</html>
