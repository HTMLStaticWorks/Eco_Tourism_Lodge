<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Sylvan Retreat</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="assets/images/logo-icon.png">
    <style>
        body { display: flex; min-height: 100vh; background: var(--secondary); color: var(--text-main); font-family: 'Inter', sans-serif; }
        
        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-content { flex: 1; padding: 60px; overflow-y: auto; background: var(--bg-dark); }

        .nav-item {
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .nav-item.active { background: var(--glass); color: var(--accent); border: 1px solid var(--glass-border); }
        .nav-item:hover { background: var(--glass); color: var(--accent); transform: translateX(5px); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 50px; }
        .stat-card { padding: 30px; border-radius: var(--radius); border: 1px solid var(--glass-border); background: var(--glass); }

        .booking-row {
            padding: 25px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .booking-row:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(197, 160, 89, 0.1);
            color: var(--accent);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" style="margin-bottom: 50px;">
            <a href="index.html" class="flex align-center" style="text-decoration: none; padding: 0 10px;">
                <img src="assets/images/logo-icon.png" alt="Sylvan Icon" class="logo-icon" style="height: 32px; margin-right: 12px;">
                <h2 class="serif" style="font-size: 24px; color: var(--white); letter-spacing: 2px; margin: 0;">SYLVAN</h2>
            </a>
        </div>
    </aside>

    <div class="dashboard-header-mobile">
        <div class="logo">
            <a href="index.html" class="flex align-center">
                <img src="assets/images/logo-icon.png" alt="Sylvan Icon" style="height: 24px; margin-right: 10px;">
                <h2 class="serif" style="font-size: 18px; letter-spacing: 1px; margin: 0;">SYLVAN</h2>
            </a>
        </div>
        <div id="sidebar-toggle" class="nav-toggle active" style="display: block;">
            <div class="hamburger"></div>
        </div>
    </div>

    <main class="main-content">
        <header class="flex justify-between align-center" style="margin-bottom: 40px;">
            <h1 class="serif" style="font-size: 38px;">Welcome back, Alex</h1>
            <div class="flex align-center" style="gap: 20px;">
                <div class="toggles">
                    <div id="theme-toggle" class="toggle-btn" title="Toggle Theme">☀️</div>
                    <div id="rtl-toggle" class="toggle-btn" title="Toggle RTL">RTL</div>
                </div>
                <div class="glass" style="padding: 10px 20px; border-radius: 30px; font-size: 14px;">Member Tier: <span class="text-accent">Gold Leaf</span></div>
            </div>
        </header>

        <script src="js/theme-toggle.js"></script>
    <script src="js/mobile-menu.js"></script>

        <section class="stats-grid">
            <div class="stat-card glass">
                <h4 class="uppercase" style="font-size: 12px; margin-bottom: 10px; opacity: 0.6;">Upcoming Stays</h4>
                <div style="font-size: 32px; font-weight: 600;">02</div>
            </div>
            <div class="stat-card glass">
                <h4 class="uppercase" style="font-size: 12px; margin-bottom: 10px; opacity: 0.6;">Nights in Wild</h4>
                <div style="font-size: 32px; font-weight: 600;">14</div>
            </div>
            <div class="stat-card glass">
                <h4 class="uppercase" style="font-size: 12px; margin-bottom: 10px; opacity: 0.6;">Conservation Impact</h4>
                <div class="text-accent" style="font-size: 32px; font-weight: 600;">$1.2k</div>
            </div>
        </section>

        <section>
            <h2 class="serif" style="font-size: 28px; margin-bottom: 30px;">Active Itinerary</h2>
            <div class="booking-row">
                <div class="flex" style="gap: 20px; align-items: center;">
                    <div style="width: 80px; height: 80px; border-radius: 8px; background-image: url('assets/images/room-detail.png'); background-size: cover;"></div>
                    <div>
                        <h4 class="serif" style="font-size: 22px;">Celestial Canopy Suite</h4>
                        <p style="font-size: 14px; color: var(--text-muted);">April 10 - April 12, 2026</p>
                    </div>
                </div>
                <div class="flex align-center" style="gap: 40px;">
                    <div style="text-align: right;">
                        <span class="status-badge">Confirmed</span>
                    </div>
                    <a href="#" class="btn btn-outline" style="font-size: 10px;">Modify</a>
                </div>
            </div>

            <div class="booking-row">
                <div class="flex" style="gap: 20px; align-items: center;">
                    <div style="width: 80px; height: 80px; border-radius: 8px; background-image: url('https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=200&q=80'); background-size: cover;"></div>
                    <div>
                        <h4 class="serif" style="font-size: 20px;">The Emerald Trek</h4>
                        <p style="font-size: 14px; color: var(--text-muted);">Guided adventure for 2 adults</p>
                    </div>
                </div>
                <div class="flex align-center" style="gap: 40px;">
                    <div style="text-align: right;">
                        <span class="status-badge">Reserved</span>
                    </div>
                    <a href="#" class="btn btn-outline" style="font-size: 10px;">Cancel</a>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
