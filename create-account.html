<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begin Journey | Sylvan Retreat</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="assets/images/logo-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: #0a0a0a;
        }

        .login-wrapper {
            min-height: 100vh;
            width: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('cinematic_jungle_login_bg_1774512994947.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-card h1 {
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            color: white;
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            padding: 16px;
            font-weight: 500;
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .auth-footer a:hover {
            opacity: 0.8;
        }

        .back-home {
            position: absolute;
            top: 40px;
            left: 40px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .back-home:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <span>&larr;</span> Back to Sanctuary
    </a>

    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="serif" style="font-size: 32px;">Begin Journey</h1>
            <p>Step into a world of curated tranquility</p>

            <form>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>First Name</label>
                        <input type="text" class="form-control" placeholder="Elias">
                    </div>
                    <div class="form-group full">
                        <label>Last Name</label>
                        <input type="text" class="form-control" placeholder="Thorne">
                    </div>
                    <div class="form-group full">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="journey@sylvan.com">
                    </div>
                    <div class="form-group full">
                        <label>Create Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                </div>

                <div style="margin-bottom: 25px; text-align: left;">
                    <label style="display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: var(--text-muted); cursor: pointer; line-height: 1.4;">
                        <input type="checkbox" style="accent-color: var(--accent); margin-top: 3px;" required> 
                        I agree to the Sanctuary Terms & Conditions and Privacy Policy.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already part of the story? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

</body>
</html>
