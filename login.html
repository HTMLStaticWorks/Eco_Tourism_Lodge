<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login | Sylvan Retreat</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="assets/images/logo-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background: var(--bg-dark);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .login-wrapper {
            min-height: 100vh;
            width: 100%;
            /* Theme-aware overlay */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('cinematic_jungle_login_bg_1774512994947.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        [data-theme="light"] .login-wrapper {
            background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.6)), url('cinematic_jungle_login_bg_1774512994947.png');
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 60px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
            color: var(--white); /* This flips to black in index.css light mode */
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-card h1 {
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: var(--white);
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            color: var(--text-main); /* Theme-aware text color */
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease, background 0.3s, color 0.3s;
        }

        [data-theme="light"] .form-control {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111111;
        }
        
        [data-theme="light"] .auth-divider-text {
            background: #f5f7f6 !important;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            padding: 16px;
            font-weight: 500;
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .auth-footer a:hover {
            opacity: 0.8;
        }

        .back-home {
            position: absolute;
            top: 40px;
            left: 40px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .back-home:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="toggles" style="position: absolute; top: 40px; right: 40px; z-index: 100;">
        <div id="theme-toggle" class="toggle-btn" title="Toggle Theme">☀️</div>
        <div id="rtl-toggle" class="toggle-btn" title="Toggle RTL">RTL</div>
    </div>

    <script src="js/theme-toggle.js"></script>

    <a href="index.html" class="back-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Home
    </a>

    <div class="login-wrapper" style="min-height: 100vh; padding: 60px 20px;">
        <div class="login-card">
            <a href="index.html" class="logo-link" style="margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; text-decoration: none;">
                <img src="assets/images/logo-icon.png" alt="Sylvan Icon" style="height: 40px; margin-bottom: 10px;">
                <span class="serif" style="font-size: 24px; letter-spacing: 4px; color: var(--accent);">SYLVAN</span>
            </a>

            <h1 class="serif" style="font-size: 32px; margin-top: 10px;">Welcome Back</h1>
            <p>Access your private jungle sanctuary</p>

            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="nature@sylvan.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--accent);"> Remember Me
                    </label>
                    <a href="#" style="font-size: 13px; color: var(--accent); text-decoration: none;">Forgot?</a>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Enter The Retreat</button>
            </form>

            <div style="margin: 30px 0; position: relative;">
                <hr style="border: 0; border-top: 1px solid var(--glass-border);">
                <span class="auth-divider-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-dark); padding: 0 15px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; transition: background 0.3s;">Or sign in with</span>
            </div>

            <div class="flex justify-center" style="gap: 15px;">
                <a href="#" class="social-icon" title="Google"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h4.74c-.2 1.06-.9 1.95-1.82 2.56l2.84 2.2c1.66-1.53 2.62-3.79 2.62-6.48 0-.54-.05-1.07-.15-1.56h-8.23z"/><path d="M12.48 24c2.59 0 4.77-.86 6.36-2.32l-2.84-2.2c-.89.6-2.02.95-3.52.95-2.71 0-5.01-1.83-5.83-4.3H3.75v2.23C5.33 21.5 8.65 24 12.48 24z"/><path d="M6.65 16.13a7.11 7.11 0 0 1 0-4.26V9.64H3.75a11.97 11.97 0 0 0 0 9.72l2.9-2.23z"/><path d="M12.48 4.75c1.41 0 2.67.49 3.67 1.44l2.74-2.74C17.25 1.93 15.07 1 12.48 1c-3.83 0-7.15 2.5-8.73 5.86l2.9 2.23c.82-2.47 3.12-4.34 5.83-4.34z"/></svg></a>
                <a href="#" class="social-icon" title="Facebook"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
                <a href="#" class="social-icon" title="X (Twitter)"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="create-account.html">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
    <div id="scroll-top" class="scroll-top">↑</div>
    <script src="js/scroll-top.js"></script>
</body>
</html>
